*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
#app{max-width:960px;margin:0 auto;padding:1.5rem 1rem 4rem}

/* Landing */
.landing{max-width:480px;margin:4rem auto;background:#fff;border-radius:16px;padding:2.5rem;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.landing h1{font-size:24px;font-weight:600;margin-bottom:4px}
.landing .sub{font-size:13px;color:#888;margin-bottom:1.5rem}
.landing .instructions{background:#f5f5f3;border-radius:10px;padding:1rem;font-size:13px;color:#555;line-height:1.6;margin-bottom:1.5rem}
.landing .instructions b{color:#1a1a1a}
.landing input{width:100%;font-size:15px;padding:10px 14px;border-radius:10px;border:1.5px solid #ddd;margin-bottom:8px;outline:none;transition:border .15s}
.landing input:focus{border-color:#7C5CBF}
.landing button.primary{width:100%;padding:11px;font-size:14px;font-weight:600;border-radius:10px;border:none;background:#7C5CBF;color:#fff;cursor:pointer;transition:opacity .15s}
.landing button.primary:hover{opacity:.9}
.landing .resume-section{margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid #eee}
.landing .resume-section .rlabel{font-size:11px;font-weight:500;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.resume-list{display:flex;flex-wrap:wrap;gap:6px}
.resume-btn{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:20px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px;transition:border .15s}
.resume-btn:hover{border-color:#7C5CBF}
.error{font-size:12px;color:#c0392b;margin-top:6px}

/* Nav */
.topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:1rem}
.topbar h1{font-size:20px;font-weight:600}
.topbar .meta{font-size:12px;color:#888;margin-top:1px}
.topbar .user-chip{display:flex;align-items:center;gap:6px;font-size:13px;color:#555}
.topbar .switch-btn{font-size:12px;color:#aaa;background:none;border:none;cursor:pointer;padding:4px 6px;margin-left:4px}
.saving{font-size:11px;color:#aaa}
.main-nav{display:flex;gap:0;border-bottom:1.5px solid #e0e0e0;margin-bottom:1.5rem}
.main-nav button{background:none;border:none;border-bottom:2.5px solid transparent;padding:8px 16px;font-size:13px;cursor:pointer;color:#888;margin-bottom:-1.5px;transition:all .15s}
.main-nav button.active{color:#1a1a1a;font-weight:600;border-bottom-color:#7C5CBF}
.day-tabs{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.day-tabs button{padding:6px 18px;border-radius:20px;font-size:13px;cursor:pointer;border:1.5px solid #ddd;background:#fff;transition:all .15s;font-weight:500}
.day-tabs button.active{background:#7C5CBF;color:#fff;border-color:#7C5CBF}

.schedule-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.schedule-grid{display:grid;min-width:620px;position:relative}
.stage-headers{display:grid;gap:0;margin-bottom:0;position:sticky;top:0;z-index:10;background:#f5f5f3;padding-bottom:4px}
.stage-header{font-size:11px;font-weight:700;text-align:center;padding:6px 4px;letter-spacing:.05em;text-transform:uppercase;border-radius:6px 6px 0 0}
.schedule-body{display:flex;position:relative}
.time-col{width:44px;flex-shrink:0;position:relative}
.time-label{position:absolute;font-size:10px;color:#aaa;right:6px;transform:translateY(-50%);white-space:nowrap}
.stages-area{display:grid;flex:1;gap:0;position:relative}
.stage-col{position:relative;border-left:1px solid #e8e8e8;min-height:100%}
.set-block{position:absolute;left:3px;right:3px;border-radius:8px;cursor:pointer;padding:6px 7px;border:1.5px solid transparent;transition:all .15s;user-select:none;overflow:hidden}
.set-block:hover{filter:brightness(.95)}
.set-block .set-name{font-size:11px;font-weight:700;line-height:1.2;margin-bottom:2px}
.set-block .set-time{font-size:9px;opacity:.7;margin-bottom:3px}
.set-block .set-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.set-block .set-dot{width:7px;height:7px;border-radius:50%}
.set-block.selected{border-width:2px}
.set-block.conflict{border-color:#e74c3c!important;background:#fee!important;animation:pulse .6s ease-in-out}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

.match-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:1rem}

// ── Helpers ──
function contrast(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return(r*299+g*587+b*114)/1000>128?"#000":"#fff";
}
function avatar(name,color,size=28){
  const ini=name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  return`<div class="avatar"style="width:${size}px;height:${size}px;background:${color};color:${contrast(color)};font-size:${Math.round(size*.38)}px;">${ini}</div>`;
}
function setKey(day,set){return`${day}||${set.stage}||${set.name}`;}
function userPicked(user,day,set){return user.picks&&user.picks.includes(setKey(day,set));}
function pickersOf(day,set){return db_state.users.filter(u=>userPicked(u,day,set));}

function overlapMins(a,b){return Math.max(0,Math.min(a.end,b.end)-Math.max(a.start,b.start));}

function conflictSets(user,day){
  const picked=SCHEDULE[day].filter(s=>userPicked(user,day,s));
  const conflicts=new Set();
  for(let i=0;i<picked.length;i++)for(let j=i+1;j<picked.length;j++){
    if(overlapMins(picked[i],picked[j])>30){
      conflicts.add(setKey(day,picked[i]));
      conflicts.add(setKey(day,picked[j]));
    }
  }
  return conflicts;
}

function sharedSets(a,b){
  if(!a.picks||!b.picks)return[];
  return a.picks.filter(p=>b.picks.includes(p));
}
function overlapPct(a,b){
  if(!a.picks||!b.picks)return 0;
  const union=new Set([...(a.picks||[]),...(b.picks||[])]);
  if(!union.size)return 0;
  return Math.round(sharedSets(a,b).length/union.size*100);
}

      const h=(set.end-set.start)*PX_PER_MIN;
      const c=STAGE_COLORS[stage];
      const picked=currentUser&&userPicked(currentUser,activeDay,set);
      const isConflict=conflicts.has(setKey(activeDay,set));
      const pickers=pickersOf(activeDay,set);
      const dots=pickers.map(u=>`<div class="set-dot"style="background:${u.color}"></div>`).join("");
      let bg=c.bg,border=c.border;
      if(isConflict){bg="#fee2e2";border="#ef4444";}
      else if(picked&&currentUser){bg=`${currentUser.color}22`;border=currentUser.color;}
      const bold=set.headliner?"font-weight:800;":"";
      const key=setKey(activeDay,set).replace(/'/g,"\\'");
      return`<div class="set-block${picked?" selected":""}${isConflict?" conflict":""}"
        style="top:${top}px;height:${h}px;background:${bg};border-color:${border};"
        onclick="handleSetClick('${key}')"
        oncontextmenu="handleSetInfo(event,'${key}')">
        <div class="set-name"style="${bold}color:${isConflict?"#991b1b":c.text}">${set.name}</div>
        <div class="set-time"style="color:${c.text}">${fmt(set.start)}–${fmt(set.end)}</div>
        ${pickers.length?`<div class="set-dots">${dots}</div>`:""}
      </div>`;
    }).join("");
    return`<div class="stage-col"style="height:${totalH}px;position:relative;">${blocks}</div>`;
  }).join("");

  return`
    <div class="day-tabs">
      ${["Friday","Saturday","Sunday"].map(d=>`<button class="${d===activeDay?"active":""}"onclick="setDay('${d}')">${d}</button>`).join("")}
    </div>
    <p style="font-size:11px;color:#aaa;margin-bottom:10px">Tap a set to select it. Right-click (or long-press) to see who's going. Conflicts (30+ min overlap) highlight red.</p>
    <div class="schedule-wrap">
      <div style="display:grid;grid-template-columns:${stageGridCols};gap:0;margin-bottom:4px;padding-left:0">
        <div></div>${stageHeaders}
      </div>
      <div style="display:grid;grid-template-columns:${stageGridCols};gap:0">
        <div class="time-col"style="height:${totalH}px;position:relative">${timeLabels}</div>
        <div style="grid-column:2/-1;display:grid;grid-template-columns:repeat(${STAGES.length},1fr);position:relative">
          ${hLines}${stageCols}
        </div>
      </div>
    </div>`;
}

// ── Matching render ──
function renderMatching(){
  if(!currentUser)return`<p class="empty">Join to see your matches.</p>`;
  const others=db_state.users.filter(u=>u.id!==currentUser.id);
  if(!others.length)return`<p class="empty">No one else has joined yet.</p>`;

  // ranked pairs
  const pairs=others.map(u=>({user:u,pct:overlapPct(currentUser,u),shared:sharedSets(currentUser,u)}))
    .sort((a,b)=>b.pct-a.pct);

  const pairCards=pairs.map(({user,pct,shared})=>{
    const tags=shared.slice(0,5).map(k=>{
      const parts=k.split("||");return`<span class="shared-tag">${parts[2]}</span>`;
    }).join("")+(shared.length>5?`<span class="shared-tag">+${shared.length-5}</span>`:"");
    return`<div class="match-card">
      <div class="pair">${avatar(currentUser.name,currentUser.color,20)}<span>+</span>${avatar(user.name,user.color,20)}<span>${user.name}</span></div>
      <div class="pct">${pct}%</div>
      <div class="shared-n">${shared.length} set${shared.length!==1?"s":""} in common</div>
      <div class="shared-tags">${tags}</div>
    </div>`;
  }).join("");

  // clusters: group people who share ≥3 sets with current user
  // find common sets across subgroups
  const usersWithPicks=db_state.users.filter(u=>u.picks&&u.picks.length);
  const clusterMap={};
  usersWithPicks.forEach(u=>{
    if(!u.picks)return;
    u.picks.forEach(p=>{
      if(!clusterMap[p])clusterMap[p]=[];
      clusterMap[p].push(u);
    });
  });
  // top shared sets (3+ people want it)
  const hotSets=Object.entries(clusterMap)
    .filter(([,users])=>users.length>=3)
    .sort((a,b)=>b[1].length-a[1].length)
    .slice(0,8);

  const clusterCards=hotSets.map(([key,users])=>{
    const parts=key.split("||");
    const setName=parts[2],day=parts[0];
    const avatars=users.map(u=>avatar(u.name,u.color,24)).join("");
    return`<div class="cluster-card">
      <div style="font-size:13px;font-weight:600;margin-bottom:3px">${setName}</div>
      <div style="font-size:11px;color:#aaa;margin-bottom:8px">${day}</div>
      <div class="cluster-people">${avatars}</div>
      <div style="font-size:11px;color:#888">${users.length} people want this set</div>
    </div>`;
  }).join("")||`<p class="empty" style="padding:1rem 0">Not enough picks yet to find clusters.</p>`;

  return`
    <div class="match-section">
      <div class="section-label">Your matches — ranked by overlap</div>
      <div class="match-cards">${pairCards}</div>
    </div>
    <div class="match-section">
      <div class="section-label">Most-wanted sets (3+ people)</div>
      ${clusterCards}
    </div>`;
}

// ── Popup ──
function renderPopup(){
  if(!popup)return"";
  const{day,key}=popup;
  const set=SCHEDULE[day].find(s=>setKey(day,s)===key);
  if(!set)return"";
  const pickers=pickersOf(day,set);
  const rows=pickers.length
    ?pickers.map(u=>`<div class="picker-row">${avatar(u.name,u.color,24)}<span>${u.name}</span></div>`).join("")
    :`<div style="font-size:13px;color:#aaa">Nobody has selected this set yet.</div>`;
  return`<div class="popup-overlay"onclick="closePopup()">
    <div class="popup"onclick="event.stopPropagation()">
      <h3>${set.name}</h3>
      <div class="ptime">${set.stage} · ${fmt(set.start)}–${fmt(set.end)}</div>
      <div class="pickers-list">${rows}</div>
      <button class="close-btn"onclick="closePopup()">Close</button>
    </div>
  </div>`;
}

// ── Main render ──
function render(){
  if(onLanding){renderLanding();return;}

  const topbar=`<div class="topbar">
    <div>
      <div style="font-size:11px;font-weight:500;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Osheaga 2026</div>
      <h1>Group Picks</h1>
      <div class="meta">July 31–Aug 2 · Parc Jean-Drapeau, Montreal</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      ${saving?`<span class="saving">Saving…</span>`:""}
      ${currentUser?`<div class="user-chip">${avatar(currentUser.name,currentUser.color,28)}<span>${currentUser.name}</span><button class="switch-btn"onclick="doSwitch()">switch</button></div>`:`<button onclick="doSwitch()"style="font-size:13px;padding:6px 12px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer">Join / switch</button>`}
    </div>
  </div>`;

  const nav=`<nav class="main-nav">
    <button class="${view==="schedule"?"active":""}"onclick="setView('schedule')">Schedule</button>
    <button class="${view==="matching"?"active":""}"onclick="setView('matching')">Matching</button>
  </nav>`;

  let main="";
  if(view==="schedule")main=renderSchedule();
  else main=renderMatching();

  const footer=`<div class="footer">
    <span>In the group (${db_state.users.length}):</span>
    ${db_state.users.map(u=>`<div class="fu">${avatar(u.name,u.color,18)}<span>${u.name}(${(u.picks||[]).length})</span></div>`).join("")}
  </div>`;

  document.getElementById("app").innerHTML=topbar+nav+main+footer+renderPopup();
}

function renderLanding(){
  const resumeSection=db_state.users.length?`
    <div class="resume-section">
      <div class="rlabel">Or resume as</div>
      <div class="resume-list">
        ${db_state.users.map(u=>`<button class="resume-btn"onclick="doResume('${u.id}')">${avatar(u.name,u.color,20)}<span>${u.name}</span></button>`).join("")}
      </div>
    </div>`:"";

  document.getElementById("app").innerHTML=`
    <div class="landing">
      <h1>Osheaga 2026</h1>
      <div class="sub">July 31–Aug 2 · Parc Jean-Drapeau, Montreal</div>
      <div class="instructions">
        <b>How it works:</b><br>
        1. Enter your name and tap Join.<br>
        2. On the <b>Schedule</b> tab, tap any set to select it — your picks are saved instantly and shared with the group.<br>
        3. If two of your selected sets overlap by more than 30 minutes, they'll turn red as a conflict warning.<br>
        4. Tap a set a second time to deselect it.<br>
        5. Right-click (or long-press on mobile) any set to see who else is going.<br>
        6. Visit the <b>Matching</b> tab to see how much overlap you have with each friend.
      </div>
      <input id="name-input"placeholder="Your name"onkeydown="if(event.key==='Enter')doJoin()"/>
      ${nameError?`<div class="error">${nameError}</div>`:""}
      <button class="primary"onclick="doJoin()">Join →</button>
      ${resumeSection}
    </div>`;
}

// ── Actions ──
window.doJoin=()=>{
  const name=(document.getElementById("name-input")||{value:""}).value.trim();
  if(!name)return;
  if(db_state.users.find(u=>u.name.toLowerCase()===name.toLowerCase())){
    nameError="That name is taken — pick another or resume below.";render();return;
  }
  const used=db_state.users.map(u=>u.color);
  const color=PALETTE.find(c=>!used.includes(c))||PALETTE[db_state.users.length%PALETTE.length];
  const user={id:String(Date.now()),name,color,picks:[]};
  db_state={...db_state,users:[...db_state.users,user]};
  currentUser=user;onLanding=false;nameError="";
  save();
};
window.doResume=id=>{
  currentUser=db_state.users.find(u=>u.id===id)||null;
  onLanding=false;render();
};
window.doSwitch=()=>{onLanding=true;currentUser=null;render();};
window.setView=v=>{view=v;render();};
window.setDay=d=>{activeDay=d;render();};

window.handleSetClick=key=>{
  if(!currentUser){onLanding=true;render();return;}
  const picks=currentUser.picks||[];
  currentUser={...currentUser,picks:picks.includes(key)?picks.filter(p=>p!==key):[...picks,key]};
  db_state={...db_state,users:db_state.users.map(u=>u.id===currentUser.id?currentUser:u)};
  save();
};
window.handleSetInfo=(e,key)=>{
  e.preventDefault();
  popup={day:activeDay,key};render();
};
window.closePopup=()=>{popup=null;render();};

// Long press for mobile
let pressTimer=null;
document.addEventListener("touchstart",e=>{
  const el=e.target.closest(".set-block");
  if(!el)return;
  pressTimer=setTimeout(()=>{
    const key=el.getAttribute("onclick").match(/'([^']+)'/)[1];
    popup={day:activeDay,key};render();
  },500);
},{passive:true});
document.addEventListener("touchend",()=>{clearTimeout(pressTimer);},{passive:true});

render();
</script>
</body>
